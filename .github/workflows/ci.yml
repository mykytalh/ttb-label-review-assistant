name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run test:coverage

      - run: npm run lint

      # Build does not call the model; a placeholder key satisfies any import-time checks.
      - run: npm run build
        env:
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder
